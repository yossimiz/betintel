name: Update casino offer data

on:
  schedule:
    # Runs daily at 06:15 UTC. GitHub schedules can start a little later.
    - cron: '15 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-casino-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run updater
        run: node bot.js

      - name: Commit updated data when changed
        run: |
          if git diff --quiet -- data.json; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "chore: update casino offer data"
          git push
